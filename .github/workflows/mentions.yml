name: Mention Responder

# Replies to anyone who tags @ragetrack on a tweet.
# The X API account is on a METERED CREDIT plan, so every poll costs credits even when
# there are no new mentions. This interval trades responsiveness against credit burn:
#   */5 = ~288 polls/day (snappiest)  ·  */10 = 144/day (balanced, default)  ·  */30 = 48/day (frugal)
# Tune to whatever the plan's monthly credit budget allows.
# NOTE: GitHub's `schedule` trigger is unreliable/delayed — for a truly responsive bot,
# run `python main.py watch` on an always-on host (Render worker) instead of this cron.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: mentions
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # Restore the last-processed mention id. Unique key per run + prefix restore-keys
      # gives us a mutable cache: we always save this run's updated file and restore the
      # most recent one on the next run.
      - name: Restore mention state
        uses: actions/cache@v4
        with:
          path: .last_mention_id
          key: last-mention-${{ github.run_id }}
          restore-keys: |
            last-mention-

      - name: Respond to new mentions
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BOT_USERNAME: ragetrack
        run: python main.py mentions-once
