name: Mention Responder

# Replies to anyone who tags @ragetrack on a tweet. Runs every 5 minutes (GitHub's
# minimum cron granularity), so a tag gets an answer within ~5 min.
# State (.last_mention_id) is carried between runs via the cache below, so each
# mention is answered exactly once. Scheduled runs can be delayed a bit under load.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: mentions
  cancel-in-progress: false

jobs:
  respond:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # Restore the last-processed mention id. Unique key per run + prefix restore-keys
      # gives us a mutable cache: we always save this run's updated file and restore the
      # most recent one on the next run.
      - name: Restore mention state
        uses: actions/cache@v4
        with:
          path: .last_mention_id
          key: last-mention-${{ github.run_id }}
          restore-keys: |
            last-mention-

      - name: Respond to new mentions
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BOT_USERNAME: ragetrack
        run: python main.py mentions-once
